<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BriefCode — Instant PR & Ticket Intelligence</title>
  <!-- Google Fonts: JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            border: 'hsl(240 5.9% 90%)',
            input: 'hsl(240 5.9% 90%)',
            ring: 'hsl(240 5.9% 10%)',
            background: 'hsl(240 10% 3.9%)',
            foreground: 'hsl(0 0% 98%)',
            primary: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)', // Green-ish terminal primary color
              foreground: 'hsl(355.7 100% 97.3%)',
            },
            secondary: {
              DEFAULT: 'hsl(240 4.8% 95.9%)',
              foreground: 'hsl(240 5.9% 10%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(0 0% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(240 3.7% 15.9%)',
              foreground: 'hsl(240 5% 64.9%)',
            },
            card: {
              DEFAULT: 'hsl(240 10% 6%)',
              foreground: 'hsl(0 0% 98%)',
            },
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background-color: hsl(240 10% 3.9%);
      color: hsl(0 0% 98%);
      font-family: 'JetBrains Mono', monospace;
    }
    /* Custom Scrollbar for Hacker Aesthetic */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: hsl(240 10% 6%);
    }
    ::-webkit-scrollbar-thumb {
      background: hsl(240 3.7% 20%);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: hsl(142.1 76.2% 36.3% / 0.5);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-emerald-800/55 selection:text-white">
  <!-- Toast Notification System -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- App Mounting Node -->
  <div id="app" class="flex h-screen w-full overflow-hidden">
    <!-- View content is injected here by app.js -->
    <div class="flex-1 flex items-center justify-center">
      <div class="flex flex-col items-center gap-3 text-muted">
        <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-emerald-500"></i>
        <span class="text-xs font-mono tracking-widest text-emerald-500/80 uppercase">Loading System...</span>
      </div>
    </div>
  </div>

  <!-- Main JavaScript File -->
  <script src="/static/app.js"></script>
</body>
</html>
